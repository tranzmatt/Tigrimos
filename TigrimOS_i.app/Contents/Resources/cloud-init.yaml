#cloud-config
# TigrimOS VM provisioning — installs Node.js 20, Python 3, and TigrimOS

hostname: tigris
manage_etc_hosts: true

users:
  - name: tigris
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true

# Force apt to use IPv4 only (IPv6 is often unreachable inside VMs)
bootcmd:
  - echo 'Acquire::ForceIPv4 "true";' > /etc/apt/apt.conf.d/99force-ipv4

apt:
  conf: |
    Acquire::ForceIPv4 "true";

package_update: true
package_upgrade: true

packages:
  - curl
  - git
  - build-essential
  - python3
  - python3-pip
  - python3-venv
  - net-tools

runcmd:
  # Install Node.js 20
  - curl -4 -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs

  # Create Python virtual environment
  - python3 -m venv /opt/venv
  - /opt/venv/bin/pip install --no-cache-dir numpy pillow matplotlib pandas scipy seaborn openpyxl python-docx duckduckgo-search requests

  # Install clawhub CLI
  - npm i -g clawhub tsx

  # Setup TigrimOS from shared mount, fallback to git clone
  - mkdir -p /app
  - |
    if mountpoint -q /mnt/tiger-cowork 2>/dev/null && [ -f /mnt/tiger-cowork/package.json ]; then
      echo "Copying from local source..."
      cp -r /mnt/tiger-cowork/* /app/
    else
      echo "Local source not found, cloning from GitHub..."
      git clone --depth 1 https://github.com/Sompote/TigrimOS.git /tmp/tigris-src
      cp -r /tmp/tigris-src/tiger_cowork/* /app/
      rm -rf /tmp/tigris-src
    fi
  - cd /app && npm install --ignore-scripts --omit=dev 2>/dev/null || true
  - cd /app/client && npm install 2>/dev/null || true
  - cd /app/client && npx vite build 2>/dev/null || true
  # Fix settings.json — replace dev-machine paths with VM paths
  - |
    if [ -f /app/data/settings.json ]; then
      python3 -c "
import json
fp='/app/data/settings.json'
with open(fp) as f: s=json.load(f)
s['sandboxDir']='/app'
s['pythonPath']='/opt/venv/bin/python3'
with open(fp,'w') as f: json.dump(s,f,indent=2)
" || true
    else
      mkdir -p /app/data
      echo '{"sandboxDir":"/app","pythonPath":"/opt/venv/bin/python3","tigerBotApiKey":"","tigerBotModel":"TigerBot-70B-Chat","mcpTools":[],"webSearchEnabled":false}' > /app/data/settings.json
    fi
  # Fix projects.json — migrate old absolute paths to relative
  - |
    if [ -f /app/data/projects.json ]; then
      python3 -c "
import json, os
fp='/app/data/projects.json'
with open(fp) as f: projects=json.load(f)
changed=False
for p in projects:
    wf=p.get('workingFolder','')
    if wf and os.path.isabs(wf) and not wf.startswith('/app'):
        p['workingFolder']=os.path.basename(wf)
        changed=True
if changed:
    with open(fp,'w') as f: json.dump(projects,f,indent=2)
" || true
    fi

  # Create systemd service for TigrimOS
  - |
    cat > /etc/systemd/system/tiger-cowork.service << 'UNIT'
    [Unit]
    Description=TigrimOS
    After=network.target

    [Service]
    Type=simple
    User=tigris
    WorkingDirectory=/app
    Environment=NODE_ENV=production
    Environment=PORT=3001
    Environment=PATH=/opt/venv/bin:/usr/local/bin:/usr/bin:/bin
    ExecStart=/usr/bin/npx tsx server/index.ts
    Restart=always
    RestartSec=5

    [Install]
    WantedBy=multi-user.target
    UNIT
  - systemctl daemon-reload
  - systemctl enable tiger-cowork
  - systemctl start tiger-cowork

  # Mount shared folders via VirtioFS
  - mkdir -p /mnt/shared
  - |
    cat >> /etc/fstab << 'FSTAB'
    # TigrimOS shared folders
    tiger-cowork /mnt/tiger-cowork virtiofs defaults,nofail 0 0
    FSTAB
  - mount -a 2>/dev/null || true

  # Signal provisioning complete
  - touch /var/lib/tigris-provisioned

final_message: "TigrimOS VM provisioning complete"
